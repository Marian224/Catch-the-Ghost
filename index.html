<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrapper">
        <h1>Catch the Ghost! 👻</h1>

        <div class="stats-bar">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">High Score: <span id="high-score">0</span></div>
            <div class="stat">Lives: <span id="lives">3</span></div>
        </div>

        <button onclick="startGame()" id="btn-start" class="btn-start">Start Game 🔄</button>

        <div id="game-arena" class="game-arena">
            <div id="ghost" class="ghost" onclick="catchGhost()">👻</div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
